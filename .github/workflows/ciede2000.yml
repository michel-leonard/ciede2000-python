name: CIEDE2000 Test in Python

on:
  workflow_dispatch:

env:
  n_csv_lines: 10000000

jobs:
  test-ciede2000-py:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📂 For each step below, a new shell will be started at the repository root
        uses: actions/checkout@v6

      - name: 🛠️ Prepare the Python3 test script
        run: |
            cp -p ciede2000-numpy.py ciede2000-driver.py
            printf '%s\n' '' \
            'import sys' \
            'canonical = 2 < len(sys.argv)' \
            "with open(sys.argv[1], 'r') as f:" \
            '	for line in f:' \
            '		line = line.strip()' \
            '		if not line:' \
            '			continue' \
            "		result = ciede2000(*list(map(float, line.split(','))), canonical)" \
            '		print(f"{line},{result}")' \
            '' >> ciede2000-driver-unused.py
            printf '%s\n' '' \
            'import sys' \
            'import numpy as np' \
            '' \
            'canonical = 2 < len(sys.argv)' \
            'lines = [ ]' \
            'l1 = [ ]' \
            'a1 = [ ]' \
            'b1 = [ ]' \
            'l2 = [ ]' \
            'a2 = [ ]' \
            'b2 = [ ]' \
            'kl = [ ]' \
            'kc = [ ]' \
            'kh = [ ]' \
            'i = 0' \
            '' \
            'def exec() :' \
            '	de = ciede2000(' \
            '		np.asarray(l1, dtype = np.float64),' \
            '		np.asarray(a1, dtype = np.float64),' \
            '		np.asarray(b1, dtype = np.float64),' \
            '		np.asarray(l2, dtype = np.float64),' \
            '		np.asarray(a2, dtype = np.float64),' \
            '		np.asarray(b2, dtype = np.float64),' \
            '		np.asarray(kl, dtype = np.float64),' \
            '		np.asarray(kc, dtype = np.float64),' \
            '		np.asarray(kh, dtype = np.float64),' \
            '	canonical)' \
            '	for j in range(0, len(lines)) :' \
            '		print(f"{lines[j]},{de[j]}")' \
            '	del lines[:]' \
            '	del l1[:]' \
            '	del a1[:]' \
            '	del b1[:]' \
            '	del l2[:]' \
            '	del a2[:]' \
            '	del b2[:]' \
            '	del kl[:]' \
            '	del kc[:]' \
            '	del kh[:]' \
            '' \
            'with open(sys.argv[1], "r") as f:' \
            '	for line in f:' \
            '		line = line.strip()' \
            '		if not line:' \
            '			continue' \
            '		lines.append(line)' \
            '		v = line.split(",")' \
            '		l1.append(float(v[0]))' \
            '		a1.append(float(v[1]))' \
            '		b1.append(float(v[2]))' \
            '		l2.append(float(v[3]))' \
            '		a2.append(float(v[4]))' \
            '		b2.append(float(v[5]))' \
            '		kl.append(float(v[6]))' \
            '		kc.append(float(v[7]))' \
            '		kh.append(float(v[8]))' \
            '		i += 1' \
            '		if i == 1048576 :' \
            '			i = 0' \
            '			exec()' \
            'if i :' \
            '	exec()' \
            '' >> ciede2000-driver.py

      - name: 📦 Set up GCC
        run: |
          command -v python3 > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes python3 ; }
          command -v pip3 > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes python3-venv python3-pip ; }
          command -v gcc > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes gcc ; }
          pip3 install numpy

      - name: 🌐️ Download the CIEDE2000 driver program
        run: wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://ciede2000.pages-perso.free.fr/static/github/ciede2000-native-precision-driver.c

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: |
            gcc --version
            gcc -std=c99 -Wall -pedantic -O2 -g ciede2000-native-precision-driver.c -o ciede2000-native -lm

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede2000-native --number $n_csv_lines --with-weights --output-file test-cases.csv

      - name: 🚀 Run test cases in Python and stream to verifier
        run: |
            python3 --version
            python3 ciede2000-driver.py test-cases.csv             | ./ciede2000-native --precision 11 > summary-simplified.txt
            python3 ciede2000-driver.py test-cases.csv --canonical | ./ciede2000-native --precision 11 > summary-canonical.txt
            wait

      - name: 🏁 Conclusion
        run: |
          for compliance in simplified canonical; do
            file="summary-$compliance.txt"
            cat "$file"
            #
            if [ "${file%canonical.txt}" = "$file" ]; then
              Q1="[ ] CANONICAL [X] SIMPLIFIED"
            else
              Q1="[X] CANONICAL [ ] SIMPLIFIED"
            fi
            if grep -Fq "$Q1" "$file" && grep -Fq "Error : 0" "$file" && grep -Fq "Successes : $n_csv_lines" "$file"; then
              echo "✔️ Verification of $file successful: all $n_csv_lines color differences were correctly calculated."
            else
              echo "❌ Verification failed. See above for details."
              exit 1
            fi
          done
